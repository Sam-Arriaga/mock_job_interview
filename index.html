<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilverClassroom | Emily Interview Coach</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <img
        src="videos/silverclassroom_shield.png"
        alt="SilverClassroom"
        class="app-logo"
      />

      <button id="menuBtn" class="icon-button" aria-label="Open menu">
        ☰
      </button>
    </header>

    <main class="coach-screen">

      <section class="progress-area" title="Interview progress">
        <div class="progress-dots" aria-label="Interview progress">
          <span class="progress-dot active"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
        </div>
      </section>

      <section
        id="feedbackBox"
        class="upper-text-area"
        aria-live="polite"
      >
        Ready to begin?
      </section>

      <section class="interview-content" aria-label="AI interview area">

        <section class="video-area">
          <div class="video-card">
            <img
              id="idleImage"
              class="coach-media"
              src=""
              alt="Emily waiting"
            />

            <video
              id="emilyVideo"
              class="coach-media hidden"
              playsinline
              preload="auto"
              disablePictureInPicture>
            </video>
          </div>
        </section>

        <section class="answer-area">
          <textarea
            id="studentAnswer"
            class="answer-input"
            placeholder="Type your answer here if needed…"></textarea>
        </section>

      </section>

    </main>

    <nav class="action-bar" aria-label="Interview controls">
      <button id="backBtn" class="action-btn">⬅️<span>Back</span></button>
      <button id="clearBtn" class="action-btn">🧹<span>Clear</span></button>
      <button id="speakBtn" class="action-btn speak">🎤<span>Speak</span></button>
      <button id="submitBtn" class="action-btn">✅<span>Submit</span></button>
      <button id="nextBtn" class="action-btn primary">➡️<span>Start</span></button>
    </nav>

  </div>

  <div id="menuOverlay" class="menu-overlay hidden">
    <aside class="side-menu" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
      <div class="menu-header">
        <h2 id="menuTitle">Emily Coach Menu</h2>
        <button id="closeMenuBtn" class="close-button" aria-label="Close menu">×</button>
      </div>

      <div class="menu-section">
        <h3>💡 Learning Support</h3>
        <button id="repeatBtn" class="menu-item">Repeat question</button>
        <button id="hintBtn" class="menu-item">Hint</button>
        <button id="captionsBtn" class="menu-item">Captions</button>
        <button id="modelAnswerBtn" class="menu-item">Modeling answer</button>
        <button id="slowModeBtn" class="menu-item">Slow mode</button>
      </div>

      <div class="menu-section">
        <h3>📘 Instructions Manual</h3>
        <button id="instructionsBtn" class="menu-item">Open instructions</button>
      </div>

      <div class="menu-section danger-zone">
        <button id="restartBtn" class="menu-item warning">🔄 Restart Interview</button>
        <button id="finishBtn" class="menu-item danger">🚪 Finish Interview</button>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
