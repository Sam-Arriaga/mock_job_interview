<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilverClassroom | Emily Interview Coach</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app-container">

    <!-- HEADER -->
    <header class="app-header">
      <div class="brand">
        <div class="logo-shield">S</div>
        <span>SILVERCLASSROOM</span>
      </div>

      <div class="header-controls">
        <span id="progressLabel" class="progress-label">Progress: 1 / 1</span>

        <select id="captionMode" class="listening-support" aria-label="Listening Support">
          <option value="none">No Captions</option>
          <option value="key">Key Ideas Only</option>
          <option value="full">Full Captions</option>
        </select>

        <button class="settings-btn" aria-label="Settings">☰</button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-layout">

      <!-- LEFT PANEL: VIDEO -->
      <section class="video-panel">

        <div class="video-container">
          <img
            id="idleImage"
            src=""
            alt="Emily Idle"
            class="idle-image"
          />

          <video
            id="emilyVideo"
            class="emily-video"
            autoplay
            muted
            playsinline
          ></video>
        </div>

        <div id="subtitleBox" class="subtitle-box">
          Emily subtitles will appear here...
        </div>

        <div id="systemBanner" class="system-banner hidden"></div>

        <div class="caption-box">
          <p id="captionText">Listening support text will appear here.</p>
        </div>

      </section>

      <!-- RIGHT PANEL: INTERVIEW -->
      <section class="interview-panel">

        <h2 id="questionText">
          Loading question...
        </h2>

        <textarea
          id="studentAnswer"
          placeholder="Write your answer here..."
        ></textarea>

        <div class="button-group">
          <button id="startBtn">Start Interview</button>
          <button id="repeatBtn">Repeat Question</button>
          <button id="submitBtn">Submit Answer</button>
          <button id="nextBtn">Next</button>
        </div>

        <div id="feedbackPanel" class="feedback-panel">
          <h3 id="feedbackTitle">Feedback</h3>
          <p id="feedbackMessage">Waiting for answer...</p>
        </div>

      </section>

    </main>

  </div>

  <!-- JavaScript controller -->
  <script src="script.js"></script>

</body>
</html>
